name: Rust

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Name matches package.name in Cargo.toml
  NAME: lightningview
  # Bundle name matches package.metadata.bundle.name
  BUNDLE_NAME: LightningView

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Install GUI dependencies for eframe/egui and clipboard support
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libavcodec-dev libavformat-dev libavutil-dev libswresample-dev libswscale-dev libasound2-dev pkg-config clang libclang-dev cmake libx11-dev libxext-dev libxrender-dev libxrandr-dev libxcursor-dev libxi-dev libxfixes-dev libxtst-dev libxss-dev libxkbcommon-dev libwayland-dev wayland-protocols

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ./target
          key: test-cargo-registry-${{ hashFiles('Cargo.lock') }}

      - name: Run tests
        # Git dependencies (crawler/imagepipe) are handled automatically by cargo
        run: cargo test --verbose

