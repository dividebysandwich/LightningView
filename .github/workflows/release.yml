  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - TARGET: x86_64-unknown-linux-gnu 
            OS: ubuntu-latest
          - TARGET: x86_64-apple-darwin
            OS: macos-latest
          - TARGET: aarch64-apple-darwin
            OS: macos-latest
          - TARGET: x86_64-pc-windows-msvc
            OS: windows-latest
    needs: test
    runs-on: ${{ matrix.OS }}
    env:
      TARGET: ${{ matrix.TARGET }}
      OS: ${{ matrix.OS }}
    steps:
      - uses: actions/checkout@v4

      - name: Calculate Cargo hash
        id: cargo-hash
        run: |
          if command -v sha256sum > /dev/null; then
            echo "hash=$(sha256sum Cargo.lock | awk '{print $1}')" >> $GITHUB_OUTPUT
          else
            echo "hash=$(shasum -a 256 Cargo.lock | awk '{print $1}')" >> $GITHUB_OUTPUT
          fi

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ./target
          key: build-cargo-registry-${{ matrix.TARGET }}-${{ steps.cargo-hash.outputs.hash }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libwayland-dev

      - name: Install rust target
        run: rustup target add $TARGET
        
      - name: Install cargo-bundle
        if: runner.os == 'macOS'
        run: cargo install cargo-bundle

      - name: Run build (Linux/Windows)
        if: runner.os != 'macOS'
        run: cargo build --release --verbose --target $TARGET

      - name: Run bundle (macOS)
        if: runner.os == 'macOS'
        run: cargo bundle --release --target $TARGET

      - name: Install zip (Windows)
        if: runner.os == 'Windows'
        run: choco install zip
        
      - name: Compress
        run: |
          mkdir -p ./artifacts
          if [[ $GITHUB_REF_TYPE =~ ^tag$ ]]; then
            TAG=$GITHUB_REF_NAME
          else
            TAG=$GITHUB_SHA
          fi

          # Windows
          if [[ $OS =~ ^windows.*$ ]]; then
              EXEC=$NAME.exe
              mv ./target/$TARGET/release/$EXEC ./$EXEC
              zip ./artifacts/$NAME-$TARGET-$TAG.zip $EXEC README.md LICENSE
          
          # MacOS
          elif [[ $OS =~ ^macos.*$ ]]; then
              # cargo-bundle outputs to target/release/bundle/osx/
              # The folder name here relies on [package.metadata.bundle] name = "LightningView"
              APP_DIR="./target/$TARGET/release/bundle/osx"
              
              # Find the .app directory name automatically to be safe
              APP_NAME_WITH_EXT=$(find "$APP_DIR" -name "*.app" -maxdepth 1 -exec basename {} \;)

              if [ -z "$APP_NAME_WITH_EXT" ]; then
                  echo "Error: No .app directory found in $APP_DIR"
                  exit 1
              fi
              
              echo "Zipping app: $APP_NAME_WITH_EXT"
              
              # Copy aux files into .app parent dir for zipping
              cp ./README.md "$APP_DIR/" || true
              cp ./LICENSE "$APP_DIR/" || true
              
              (cd "$APP_DIR" && zip -r -q "../../../../../artifacts/$NAME-$TARGET-$TAG.zip" "$APP_NAME_WITH_EXT" README.md LICENSE)
          # Linux
          else
              EXEC=$NAME
              mv ./target/$TARGET/release/$EXEC ./$EXEC
              tar -czf ./artifacts/$NAME-$TARGET-$TAG.tar.gz $EXEC README.md LICENSE
          fi
          
      - name: Archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.TARGET }}
          path: |
            ./artifacts

  build-msi:
    name: Build Windows MSI
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ./target
          key: msi-cargo-registry-${{ hashFiles('Cargo.lock') }}

      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Build MSI
        run: |
          # If wix/main.wxs does not exist, init it
          if [ ! -d "wix" ]; then
            echo "Wix configuration not found, initializing defaults..."
            cargo wix init
          fi
          # Git deps are handled automatically
          cargo wix --nocapture

      - name: Archive MSI
        uses: actions/upload-artifact@v4
        with:
          name: result-msi
          path: target/wix/*.msi

  build-deb:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libwayland-dev

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ./target
          key: deb-cargo-registry-${{ hashFiles('Cargo.lock') }}

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build Debian package
        run: cargo deb

      - name: Archive Debian package
        uses: actions/upload-artifact@v4
        with:
          name: result-deb
          path: target/debian/*.deb

  build-appimage:
    name: Build Linux AppImage
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev libwayland-dev fuse libfuse2 desktop-file-utils

      - name: Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ./target
          key: appimage-cargo-registry-${{ hashFiles('Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Stage AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          install -m 755 target/release/lightningview AppDir/usr/bin/lightningview
          install -m 644 lightningview.desktop AppDir/usr/share/applications/lightningview.desktop
          install -m 644 lightningview.png AppDir/usr/share/icons/hicolor/256x256/apps/lightningview.png

          # Top-level icon + .desktop are required by AppImage tooling
          cp AppDir/usr/share/icons/hicolor/256x256/apps/lightningview.png AppDir/lightningview.png
          cp AppDir/usr/share/applications/lightningview.desktop AppDir/lightningview.desktop

      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

      - name: Build AppImage
        env:
          # GitHub Actions runners do not always allow FUSE; extract and run instead.
          APPIMAGE_EXTRACT_AND_RUN: "1"
          # Embeds the version into the output file name.
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
          OUTPUT: LightningView-${{ github.ref_type == 'tag' && github.ref_name || github.sha }}-x86_64.AppImage
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/lightningview.desktop \
            --icon-file AppDir/lightningview.png \
            --output appimage
          # linuxdeploy names its output based on the desktop entry; rename to a stable name.
          mv LightningView-*.AppImage "$OUTPUT" 2>/dev/null || mv ./*.AppImage "$OUTPUT"

      - name: Archive AppImage
        uses: actions/upload-artifact@v4
        with:
          name: result-appimage
          path: ./*.AppImage

  build-chocolatey:
    name: Build Chocolatey package
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [[ $GITHUB_REF_TYPE == "tag" ]]; then
            # Strip a leading "v" if present (e.g. v2.4.6 -> 2.4.6)
            VER="${GITHUB_REF_NAME#v}"
          else
            VER=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)"/\1/')
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Download Windows build artifact
        uses: actions/download-artifact@v4
        with:
          name: result-x86_64-pc-windows-msvc
          path: ./win-zip

      - name: Compute zip checksum
        id: sum
        shell: bash
        run: |
          ZIP=$(ls ./win-zip/*.zip | head -n1)
          if [[ -z "$ZIP" ]]; then
            echo "No Windows zip found in ./win-zip" >&2
            exit 1
          fi
          SUM=$(sha256sum "$ZIP" | awk '{print toupper($1)}')
          echo "checksum=$SUM" >> $GITHUB_OUTPUT

      - name: Stamp nuspec and install script
        shell: bash
        env:
          VER: ${{ steps.ver.outputs.version }}
          SUM: ${{ steps.sum.outputs.checksum }}
        run: |
          sed -i "s|@@VERSION@@|${VER}|g" packaging/chocolatey/lightningview.nuspec
          sed -i "s|@@VERSION@@|${VER}|g" packaging/chocolatey/tools/chocolateyinstall.ps1
          sed -i "s|@@CHECKSUM64@@|${SUM}|g" packaging/chocolatey/tools/chocolateyinstall.ps1

      - name: Pack
        shell: pwsh
        run: |
          cd packaging/chocolatey
          choco pack lightningview.nuspec --out ../../

      - name: Archive Chocolatey package
        uses: actions/upload-artifact@v4
        with:
          name: result-chocolatey
          path: ./*.nupkg

  build-flatpak:
    name: Build Linux Flatpak
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flatpak Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder elfutils
          sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Sdk//24.08 \
                                          org.freedesktop.Platform//24.08 \
                                          org.freedesktop.Sdk.Extension.rust-stable//24.08 \
                                          org.freedesktop.Sdk.Extension.llvm18//24.08

      - name: Vendor Cargo dependencies
        run: |
          mkdir -p .cargo
          # Re-resolve so the lockfile reflects the current Cargo.toml
          rm -f Cargo.lock
          cargo generate-lockfile

          # Vendor crates.io dependencies into ./vendor and write the redirect
          cargo vendor > .cargo/config.toml

          # Manual override for the 'rawler' (dnglab) git dependency
          cat >> .cargo/config.toml <<'EOF'

          [source."https://github.com/dividebysandwich/dnglab.git?diamond_fix=1"]
          git = "https://github.com/dividebysandwich/dnglab.git?diamond_fix=1"
          replace-with = "vendored-sources"

          [source."https://github.com/dividebysandwich/imagepipe"]
          git = "https://github.com/dividebysandwich/imagepipe"
          replace-with = "vendored-sources"
          EOF

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: lightningview.flatpak
          manifest-path: io.github.dividebysandwich.lightningview.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Archive Flatpak Bundle
        uses: actions/upload-artifact@v4
        with:
          name: result-flatpak
          path: lightningview.flatpak

  deploy:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, build-deb, build-msi, build-appimage, build-chocolatey, build-flatpak]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
           files: |
            ./artifacts/*/*.tar.gz
            ./artifacts/*/*.zip
            ./artifacts/*/*.deb
            ./artifacts/*/*.msi
            ./artifacts/*/*.AppImage
            ./artifacts/*/*.nupkg
            ./artifacts/*/*.flatpak